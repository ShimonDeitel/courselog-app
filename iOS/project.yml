name: Courselog
options:
  bundleIdPrefix: com.shimondeitel.courselogx
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Courselog:
    type: application
    platform: iOS
    sources:
      - path: Courselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.courselogx
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Courselog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CourselogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CourselogTests
      - path: Courselog.storekit
    dependencies:
      - target: Courselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.courselogx.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CourselogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CourselogUITests
    dependencies:
      - target: Courselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.courselogx.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Courselog:
    build:
      targets:
        Courselog: all
        CourselogTests: [test]
        CourselogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Courselog.storekit
    test:
      config: Debug
      storeKitConfiguration: Courselog.storekit
      targets:
        - CourselogTests
        - CourselogUITests
    archive:
      config: Release
